- name: Libvirt
  hosts: sn12.galaxyproject.eu
  become: true
  vars:
    hostname: sn12.galaxyproject.eu
  vars_files:
    - "secret_group_vars/jenkins.yml"
    - "secret_group_vars/all.yml"
    - secret_group_vars/aws.yml # AWS creds
  pre_tasks:
    - name: Install Dependencies
      package:
        enablerepo: crb
        name: 
          - policycoreutils-python-utils
          - python3-wheel-wheel
          - libvirt
      become: true
    - name: permit traffic in default zone for http and https service
      ansible.posix.firewalld:
        service: "{{ item }}"
        permanent: true
        state: enabled
      loop:
        - http
        - https
    # DNBD3 related Tasks
    - name: Create dnbd3 user
      ansible.builtin.group:
        name: "{{ dnbd3_group }}"
        state: present
    - name: Create dnbd3 user
      ansible.builtin.user:
        name: "{{ dnbd3_user }}"
        group: "{{ dnbd3_group }}"
        shell: /bin/false
        create_home: false
    - name: Grant access to dnbd3 root directory
      ansible.builtin.file:
        mode: "770"
        path: "{{ dnbd3_base_path }}"
        state: directory
        owner: "{{ dnbd3_user }}"
        group: "{{ dnbd3_group }}"
    # Create network setup
    - name: Create NetworkManager bridge connection
      community.general.nmcli:
        conn_name: "Bridge-KVM-V{{ bi_privat_vlan }}"
        ifname: "virbr1.{{ bi_privat_vlan }}"
        type: "bridge"
        autoconnect: true
        # Bridge Options
        ageingtime: "0"
        # IPv4 and IPv6 are disabled per the config file
        method4: disabled
        method6: disabled
        state: present
    - name: Create connection bound to the bridge
      community.general.nmcli:
        conn_name: "KVM-V{{ bi_privat_vlan }}"
        ifname: "{{ kvm_nic_name }}"
        type: bridge-slave
        master: "virbr1.{{ bi_privat_vlan }}"
        slave_type: "bridge"
        state: present
    - name: Set rp_filter for enp1s0f1 to loose mode, because two NICs on the same net wont work otherwise
      ansible.posix.sysctl:
        name: "net.ipv4.conf.{{ kvm_nic_name }}.rp_filter"
        value: '2'
        sysctl_set: true
        state: present
        reload: true
    - name: Create mountpoint for Libvirt
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Mount NFS Share for Libvirt
          Requires=network-online.target
          After=network-online.target
          Before=virtstoraged.service
          
          [Mount]
          What=ufr-dyn.isi1.public.ads.uni-freiburg.de:/ifs/isi1/ufr/bronze/nfs/denbi/dnb01/vms
          Where=/mnt
          Type=nfs
          Options=hard,rw,nosuid,nconnect=2,nodev,vers=3
          
          [Install]
          RequiredBy=virtstoraged.service
        dest: /etc/systemd/system/data.mount
  post_tasks:
    - name: Enable the service
      ansible.builtin.systemd_service:
        daemon_reload: true
        state: started
        enabled: true
        name: data.mount

  collections:
    #   - devsec.hardening
  roles:
    - hostname
    - usegalaxy-eu.dynmotd
    - geerlingguy.repo-epel
    - hxr.admin-tools
    - influxdata.chrony
    - hxr.monitor-email
    - usegalaxy-eu.autoupdates
    - usegalaxy-eu.autofs
    - hxr.aws-cli # Setup the AWS client that will be needed for route53 authentication of certbot. MUST come before nginx role
    - galaxyproject.nginx
    - ssh-host-sign
    # - hxr.autofs-format-n-mount
    # CUSTOM
    - geerlingguy.java
    # - geerlingguy.jenkins
    # - usegalaxy-eu.jenkins-ssh-key
    ## END CUSTOM
    - dj-wasabi.telegraf
    - galaxyproject.miniconda
    # - os_hardening
    # - nginx_hardening
    # - ssh_hardening
    - usegalaxy_eu.firewall
