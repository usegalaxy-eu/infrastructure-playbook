---
# tasks for tomcat 7 Configure

- name: Copy tomcat server.xml.
  template:
    src: server.xml.j2
    dest: "{{ tomcat7_conf_dir }}/server.xml"
    owner: root
    group: root
    mode: 0664
    backup: yes
  notify: restart tomcat

- name: Copy tomcat tomcat-users.xml.
  template:
    src: tomcat-users.xml.j2
    dest: "{{ tomcat7_conf_dir }}/tomcat-users.xml"
    owner: root
    group: root
    mode: 0664
    backup: yes
  notify: restart tomcat

- name: Comment out JasperListener in server.xml
  ansible.builtin.lineinfile:
    path: /usr/share/tomcat/conf/server.xml
    regexp: '^\s*<Listener className="org\.apache\.catalina\.core\.JasperListener" />\s*$'
    line: '    <!-- <Listener className="org.apache.catalina.core.JasperListener" /> -->'
    backup: yes

- name: Ensure tomcat services is started and enabled at boot.
  service:
    name: "{{ tomcat7_service }}"
    state: started
    enabled: yes
