---
- name: Check that all objectstore_id include 'scratch'
  assert:
    that:
      - galaxy_cleanup_scratchstorage | length > 0
      - galaxy_cleanup_scratchstorage | list
        | reject('search', 'scratch')
        | list
        | length == 0
    fail_msg: "Found objectstore_id entries that do NOT contain 'scratch'"
    success_msg: "All objectstore_id values contain 'scratch'"

- name: Install cleanup script
  template:
    src: "cleanup_storage.sh.j2"
    dest: "/usr/local/bin/cleanup_storage.sh"
    mode: "0555"

- name: Create cleanup status directory
  ansible.builtin.file:
    path: "{{ galaxy_cleanup_status_file | dirname }}"
    state: directory
    owner: "{{ galaxy_user.name }}"
    group: root
    mode: "0755"

- name: Initialize cleanup status metric
  ansible.builtin.file:
    path: "{{ galaxy_cleanup_status_file }}"
    state: touch
    owner: "{{ galaxy_user.name }}"
    group: root
    mode: "0644"
    access_time: preserve
    modification_time: preserve

- name: Schedule Galaxy cleanup objectstore script
  ansible.builtin.cron:
    name: "Galaxy cleanup scratch"
    job: "/usr/local/bin/cleanup_storage.sh"
    minute: "{{ galaxy_cleanup_minute }}"
    hour: "{{ galaxy_cleanup_hour }}"
    user: "{{ galaxy_user.name }}"
