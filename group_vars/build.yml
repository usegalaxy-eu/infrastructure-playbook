---
# Admin Tools
admin_packages:
  - nano
  - vim
  - htop
  - strace
  - jq
  - btop
  - wget
  - curl
  - tmux
  - git
  - nmap
  - tcpdump
  - net-tools
  - unzip
  - tmpwatch
  - rclone
  - byobu
  # centos specific
  - setools-console
  - yum-utils
  - bind-utils
  - nfs-utils

# Jenkins
jenkins_home: /opt/jenkins/jenkins
jenkins_prefer_lts: true
java_packages:
  - java-17-openjdk
jenkins_admin_token: "{{ jenkins_admin_token_secret }}"

# runSetupWizard=false is default
# Add the CSP so we can embed galaxy on WF testing pages / display HTML
jenkins_java_options: "-Dhudson.model.ParametersAction.keepUndefinedParameters=true -Djenkins.install.runSetupWizard=false -Dhudson.model.DirectoryBrowserSupport.CSP=\\\"default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'unsafe-inline'; frame-src *;\\\""


certbot_admin_email: security@usegalaxy.eu
certbot_agree_tos: --agree-tos
certbot_dns_provider: route53
certbot_auth_method: --standalone
certbot_auto_renew: true
certbot_auto_renew_user: root
certbot_auto_renew_hour: "{{ 23 |random(seed=inventory_hostname)  }}"
certbot_auto_renew_minute: "{{ 59 |random(seed=inventory_hostname)  }}"
certbot_domains:
  - "{{ inventory_hostname }}"
certbot_environment: "production" # change to production when ready to go
certbot_install_method: virtualenv
certbot_share_key_users:
  - nginx
# Miniconda
miniconda_prefix: /scratch/miniconda
miniconda_channels:
  - conda-forge

aws_cli_credentials:
  - access_key: "{{ aws_credentials.certbot.AWS_ACCESS_KEY }}"
    secret_key: "{{ aws_credentials.certbot.AWS_SECRET_KEY }}"
    homedir: /root
    owner: root
    group: root
certbot_post_renewal: |
  systemctl restart nginx || true
certbot_virtualenv_package_name: python3-virtualenv
certbot_virtualenv_command: virtualenv
certbot_well_known_root: /srv/nginx/_well-known_root
# NGINX
nginx_enable_default_server: false
nginx_servers:
  - redirect-ssl
nginx_ssl_servers:
  - build
nginx_conf_http:
  client_max_body_size: 1g
nginx_remove_default_vhost: true

# Nginx Letsencrypt bindings
nginx_ssl_role: usegalaxy-eu.certbot
nginx_conf_ssl_certificate: /etc/ssl/certs/fullchain.pem
nginx_conf_ssl_certificate_key: /etc/ssl/user/privkey-nginx.pem
