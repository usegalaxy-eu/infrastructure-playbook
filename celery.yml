---
- name: Celery cluster
  hosts: celerycluster
  become: true
  become_user: root
  vars_files:
    - "secret_group_vars/all.yml"
    - "secret_group_vars/pulsar.yml"
    - mounts/mountpoints.yml
    - mounts/dest/all.yml
  pre_tasks:
    # - name: Install Dependencies
    #   package:
    #     name: ["python38"]
    #   become: true
    # - name: Set default version of Python
    #   alternatives:
    #     name: python
    #     path: /usr/bin/python3
    - name: Increase fs.inotify.max_user_watches # see https://github.com/usegalaxy-eu/issues/issues/544
      ansible.posix.sysctl:
        name: fs.inotify.max_user_watches
        value: '524288'
        sysctl_set: true
        state: present
        reload: true

    - name: Deploy systemd override to run Celery beat only on one host
      # remove this file before removing this task
      ansible.builtin.copy:
        dest: /etc/systemd/system/celery-beat.service.d/override.conf
        content: |
          [Unit]
          ConditionHost=celery-0.bi.privat
        owner: root
        group: root
        mode: "0644"
  roles:
    - artis3n.tailscale
    - role: usegalaxy_eu.handy.os_setup
      vars:
        enable_remap_user: true
        enable_create_user: true
        enable_kernel_5: true
        enable_install_software: true
    - usegalaxy_eu.galaxy_systemd
    - influxdata.chrony
    ## Filesystems
    - usegalaxy-eu.autofs # Set up the mount points which will be needed later
    - role: usegalaxy_eu.flower
      when: inventory_hostname == "celery-1.galaxyproject.eu"
    # - usegalaxy-eu.logrotate # Rotate logs
