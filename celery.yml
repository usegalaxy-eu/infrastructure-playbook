---
- name: Celery cluster
  vars:
    celerycluster_ansible_group: celerycluster
  hosts: "{{ celerycluster_ansible_group }}"
  gather_facts: true
  become: true
  become_user: root
  vars_files:
    - "secret_group_vars/all.yml"
    - "secret_group_vars/pulsar.yml"
    - mounts/mountpoints.yml
    - mounts/dest/all.yml
  pre_tasks:
    - name: Select main node for the Celery cluster
      # The main node is the only one that runs Flower and Celery Beat. It is the first host defined in the inventory
      # for Celery Cluster group.
      block:
        - name: Register hostname of the main node
          ansible.builtin.set_fact:
            celerycluster_main_node: "{{ hostvars[groups[celerycluster_ansible_group][0]]['ansible_nodename'] }}"

        - name: Register if this host is the main node
          ansible.builtin.set_fact:
            celerycluster_is_main_node: "{{ ansible_nodename == celerycluster_main_node }}"

        - name: Print main node information
          ansible.builtin.debug:
            msg: "This host is the main node for the Celery cluster. It will be the only one running Celery Beat and Flower."
          when: celerycluster_is_main_node

    # - name: Install Dependencies
    #   package:
    #     name: ["python38"]
    #   become: true
    # - name: Set default version of Python
    #   alternatives:
    #     name: python
    #     path: /usr/bin/python3
    - name: Increase fs.inotify.max_user_watches # see https://github.com/usegalaxy-eu/issues/issues/544
      ansible.posix.sysctl:
        name: fs.inotify.max_user_watches
        value: '524288'
        sysctl_set: true
        state: present
        reload: true

    - name: Set SELinux to permissive mode
      ansible.posix.selinux:
        policy: targeted
        state: permissive

    - name: Deploy systemd override to run Celery beat only on one host
      # remove these files and folder before removing this block
      block:
        - name: Ensure systemd override directory exists
          ansible.builtin.file:
            dest: /etc/systemd/system/galaxy-celery-beat.service.d
            state: directory
            owner: root
            group: root
            mode: "0644"

        - name: Deploy systemd override file
          ansible.builtin.copy:
            dest: /etc/systemd/system/galaxy-celery-beat.service.d/override.conf
            content: |
              [Unit]
              ConditionHost={{ celerycluster_main_node }}
            owner: root
            group: root
            mode: "0644"
  roles:
    - geerlingguy.repo-epel
    - role: artis3n.tailscale  # broken (invalid API key)
      when: celerycluster_is_main_node  # mitigates breakage (doesn't fail on the main node)
    - role: usegalaxy_eu.handy.os_setup
      vars:
        enable_remap_user: true
        enable_create_user: true
        enable_kernel_5: true
        enable_install_software: true
    - usegalaxy_eu.galaxy_systemd
    - influxdata.chrony
    ## Filesystems
    - usegalaxy-eu.autofs # Set up the mount points which will be needed later
    - role: usegalaxy_eu.flower
      when: celerycluster_is_main_node
    # - usegalaxy-eu.logrotate # Rotate logs
