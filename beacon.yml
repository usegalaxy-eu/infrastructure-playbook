---
- name: Beacon
  become: true
  hosts:
    - beacon
  vars:
    playbook_secret_vars_files:
      - secret_group_vars/all.yml
      - group_vars/beacon/vault.yml
  vars_files:
    - group_vars/beacon/vars.yml
  pre_tasks:
    - name: Load secret variables
      ansible.builtin.include_vars:
        file: "{{ item }}"
      loop: "{{ playbook_secret_vars_files }}"
      no_log: true
  roles:
    - role: usegalaxy_eu.handy.os_setup
      vars:
        enable_hostname: true
        enable_powertools: true        # geerlingguy.repo-epel role doesn't enable PowerTools repository
        enable_remap_user: true
        enable_create_user: true
    - usegalaxy-eu.autoupdates  # keep all of our packages up to date
    - influxdata.chrony
    - dj-wasabi.telegraf
    - usegalaxy-eu.dynmotd # nicer MOTD/welcome message
    - paprikant.beacon
    - paprikant.beacon-importer
#    - os_hardening
#    - ssh_hardening
